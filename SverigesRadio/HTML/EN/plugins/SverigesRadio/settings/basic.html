[% PROCESS settings/header.html %]

	[% WRAPPER setting title="PLUGIN_SR_QUALITY" desc="" %]
		<select name="pref_quality">
			[% FOREACH opt IN quality_options %]
				<option value="[% opt.value %]"[% IF prefs.pref_quality == opt.value %] selected="selected"[% END %]>[% opt.label | string %]</option>
			[% END %]
		</select>
	[% END %]

	[% WRAPPER setting title="PLUGIN_SR_CHANNELS_FILTER" desc="" %]
		<select name="pref_channels_filter">
			[% FOREACH opt IN filter_options %]
				<option value="[% opt.value %]"[% IF prefs.pref_channels_filter == opt.value %] selected="selected"[% END %]>[% opt.label | string %]</option>
			[% END %]
		</select>
	[% END %]

[% PROCESS settings/footer.html %]
