[% WRAPPER settings %]

<fieldset>
    <legend>[% 'PLUGIN_SR_QUALITY' | string %]</legend>
    <div class="setting">
        <label for="pref_quality">[% 'PLUGIN_SR_QUALITY' | string %]</label>
        <select id="pref_quality" name="pref_quality">
            [% FOREACH opt IN quality_options %]
                <option value="[% opt.value %]"[% IF prefs.quality == opt.value %] selected="selected"[% END %]>
                    [% opt.label | string %]
                </option>
            [% END %]
        </select>
    </div>
</fieldset>

<fieldset>
    <legend>[% 'PLUGIN_SR_CHANNELS_FILTER' | string %]</legend>
    <div class="setting">
        <label for="pref_channels_filter">[% 'PLUGIN_SR_CHANNELS_FILTER' | string %]</label>
        <select id="pref_channels_filter" name="pref_channels_filter">
            [% FOREACH opt IN filter_options %]
                <option value="[% opt.value %]"[% IF prefs.channels_filter == opt.value %] selected="selected"[% END %]>
                    [% opt.label | string %]
                </option>
            [% END %]
        </select>
    </div>
</fieldset>

[% END %]
